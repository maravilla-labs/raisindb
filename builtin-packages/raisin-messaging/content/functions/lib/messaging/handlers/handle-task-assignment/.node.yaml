node_type: raisin:Function
properties:
  title: Handle Task Assignment
  description: >
    Handles task assignment messages by creating InboxTask and notifications.
    This handler is triggered when a message with type "task_assignment" is sent.
    It creates task entries and notifies the assignee.
  language: Starlark
  entry_file: index.py:handle_task_assignment
  execution_mode: Async
  enabled: true
  resource_limits:
    timeout_ms: 10000
    max_memory_bytes: 33554432
  input_schema:
    type: object
    required:
      - node
    properties:
      node:
        type: object
        description: The task assignment message node
      event:
        type: object
        description: The trigger event metadata
  output_schema:
    type: object
    properties:
      success:
        type: boolean
      inbox_task_path:
        type: string
        description: Path to the inbox task created
      notification_path:
        type: string
        description: Path to the notification created
      error:
        type: string
