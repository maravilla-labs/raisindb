node_type: raisin:Function
properties:
  title: Get Wards
  description: >
    Gets all wards for a given steward user. Returns users for whom the steward
    has stewardship relationships (PARENT_OF, GUARDIAN_OF). For PARENT_OF
    relationships, only includes wards who are minors (based on birth_date
    and minor_age_threshold configuration).
  language: Starlark
  entry_file: index.py:get_wards
  execution_mode: Async
  enabled: true
  resource_limits:
    timeout_ms: 5000
    max_memory_bytes: 33554432
  input_schema:
    type: object
    required:
      - steward_user_path
    properties:
      steward_user_path:
        type: string
        description: Path to the steward user node (e.g., "/users/internal/bob")
      workspace:
        type: string
        description: Workspace name (defaults to "raisin:access_control")
  output_schema:
    type: object
    properties:
      success:
        type: boolean
      wards:
        type: array
        items:
          type: object
          properties:
            user_id:
              type: string
            user_path:
              type: string
            email:
              type: string
            display_name:
              type: string
            relation_type:
              type: string
            relation_title:
              type: string
            is_minor:
              type: boolean
      error:
        type: string
