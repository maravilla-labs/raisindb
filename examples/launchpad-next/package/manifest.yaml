name: launchpad-next
version: 1.0.5
title: Launchpad Next
description: LaunchKit customer portal - Next generation demo
author: SOLUTAS GmbH
license: BSL-1.1
icon: rocket
color: "#6366f1"
keywords:
  - launchkit
  - portal
  - demo
category: examples

provides:
  nodetypes:
    - launchpad:Page
  archetypes:
    - launchpad:LandingPage
    - launchpad:KanbanBoard
    - launchpad:FileBrowser
  elementtypes:
    - launchpad:Hero
    - launchpad:TextBlock
    - launchpad:FeatureGrid
    - launchpad:ListKanbanBoards
    - launchpad:KanbanCard
  workspaces:
    - launchpad
  functions:
    - /lib/launchpad/handle-read-receipt
    - /lib/launchpad/kanban-boards
    - /lib/launchpad/kanban-cards
    - /lib/launchpad/kanban-move-card
    - /lib/launchpad/process-asset
    - /lib/launchpad/handle-task-completed
    - /lib/launchpad/handle-inbox-reply
  flows:
    - /flows/task-completed-chat
  triggers:
    - /triggers/on-read-receipt
    - /triggers/on-batch-read-receipt
    - /triggers/on-asset-ready
    - /triggers/on-task-completed
    - /triggers/on-inbox-reply

workspace_patches:
  launchpad:
    allowed_node_types:
      add:
        - launchpad:Page
        - raisin:Folder
        - raisin:Asset
  "raisin:access_control":
    allowed_node_types:
      add:
        - raisin:Folder
        - raisin:Message
        - raisin:Conversation
        - raisin:AIConversation
        - raisin:AIMessage
        - raisin:AIThought
        - raisin:AIToolCall
        - raisin:AIToolResult
        - raisin:AIToolSingleCallResult
        - raisin:AIToolResultAggregator
