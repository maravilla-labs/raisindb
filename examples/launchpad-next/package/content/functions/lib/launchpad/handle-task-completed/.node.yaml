node_type: raisin:Function
properties:
  name: handle-task-completed
  title: Handle Task Completed
  description: |
    Processes task completion messages from kanban boards.
    Creates an AI conversation in the user's ai-chats folder so the
    message appears in the existing AIChatPopup.
  execution_mode: async
  enabled: true
  language: javascript
  entry_file: index.js:handleTaskCompleted
  version: 1
  input_schema:
    type: object
    description: Trigger context with event and workspace
    properties:
      flow_input:
        type: object
        properties:
          event:
            type: object
            properties:
              type:
                type: string
              node_id:
                type: string
              node_type:
                type: string
              node_path:
                type: string
          workspace:
            type: string
  output_schema:
    type: object
    properties:
      success:
        type: boolean
      error:
        type: string
