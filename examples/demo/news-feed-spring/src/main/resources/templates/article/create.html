<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/main}">
<head>
    <title>Create Article</title>
</head>
<body>
<div layout:fragment="content">
    <div class="max-w-3xl mx-auto">
        <h1 class="text-3xl font-bold mb-8">Create New Article</h1>

        <form th:action="@{/articles/new}" th:object="${articleForm}" method="post" class="space-y-6">
            <!-- Title -->
            <div>
                <label for="title" class="block text-sm font-medium text-gray-700 mb-1">Title</label>
                <input type="text" id="title" th:field="*{title}"
                       class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500">
                <p th:if="${#fields.hasErrors('title')}" th:errors="*{title}" class="text-red-500 text-sm mt-1"></p>
            </div>

            <!-- Slug -->
            <div>
                <label for="slug" class="block text-sm font-medium text-gray-700 mb-1">URL Slug</label>
                <input type="text" id="slug" th:field="*{slug}"
                       class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500">
                <p th:if="${#fields.hasErrors('slug')}" th:errors="*{slug}" class="text-red-500 text-sm mt-1"></p>
            </div>

            <!-- Category -->
            <div>
                <label for="category" class="block text-sm font-medium text-gray-700 mb-1">Category</label>
                <select id="category" th:field="*{category}"
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500">
                    <option value="">Select category...</option>
                    <option th:each="cat : ${categories}" th:value="${cat.slug}" th:text="${cat.displayLabel}"></option>
                </select>
                <p th:if="${#fields.hasErrors('category')}" th:errors="*{category}" class="text-red-500 text-sm mt-1"></p>
            </div>

            <!-- Excerpt -->
            <div>
                <label for="excerpt" class="block text-sm font-medium text-gray-700 mb-1">Excerpt</label>
                <textarea id="excerpt" th:field="*{excerpt}" rows="2"
                          class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500"></textarea>
            </div>

            <!-- Body -->
            <div>
                <label for="body" class="block text-sm font-medium text-gray-700 mb-1">Content (Markdown)</label>
                <textarea id="body" th:field="*{body}" rows="15"
                          class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 font-mono"></textarea>
            </div>

            <!-- Image URL -->
            <div>
                <label for="imageUrl" class="block text-sm font-medium text-gray-700 mb-1">Image URL</label>
                <input type="url" id="imageUrl" th:field="*{imageUrl}"
                       class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500">
            </div>

            <!-- Status -->
            <div class="flex items-center space-x-6">
                <div class="flex items-center">
                    <input type="checkbox" id="featured" th:field="*{featured}"
                           class="w-4 h-4 text-blue-600 border-gray-300 rounded focus:ring-blue-500">
                    <label for="featured" class="ml-2 text-sm text-gray-700">Featured</label>
                </div>
                <div>
                    <label for="status" class="text-sm text-gray-700 mr-2">Status:</label>
                    <select id="status" th:field="*{status}"
                            class="px-3 py-1 border border-gray-300 rounded-lg">
                        <option value="draft">Draft</option>
                        <option value="published">Published</option>
                    </select>
                </div>
            </div>

            <!-- Submit -->
            <div class="flex space-x-4">
                <button type="submit"
                        class="px-6 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700">
                    Create Article
                </button>
                <a th:href="@{/}" class="px-6 py-2 border border-gray-300 rounded-lg hover:bg-gray-50">
                    Cancel
                </a>
            </div>
        </form>
    </div>
</div>
</body>
</html>
