<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head></head>
<body>
<header th:fragment="header" class="bg-white shadow-sm border-b">
    <div class="container mx-auto px-4">
        <div class="flex items-center justify-between h-16">
            <!-- Logo -->
            <a th:href="@{/}" class="text-xl font-bold text-gray-900">
                News Feed
            </a>

            <!-- Search -->
            <form th:action="@{/search}" method="get" class="flex-1 max-w-md mx-8">
                <div class="relative">
                    <input type="text" name="q" placeholder="Search articles..."
                           class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                    <button type="submit" class="absolute right-2 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
                        </svg>
                    </button>
                </div>
            </form>

            <!-- Auth buttons -->
            <div class="flex items-center space-x-4">
                <th:block th:if="${userContext != null and userContext.authenticated}">
                    <a th:href="@{/articles/new}" class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700">
                        New Article
                    </a>
                    <a th:href="@{/settings/tags}" class="text-gray-600 hover:text-gray-900">
                        Settings
                    </a>
                    <span class="text-gray-600" th:text="${userContext.user.displayNameOrEmail}">User</span>
                    <a th:href="@{/auth/logout}" class="text-gray-600 hover:text-gray-900">
                        Logout
                    </a>
                </th:block>
                <th:block th:unless="${userContext != null and userContext.authenticated}">
                    <a th:href="@{/auth/login}" class="text-gray-600 hover:text-gray-900">
                        Login
                    </a>
                    <a th:href="@{/auth/register}" class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700">
                        Register
                    </a>
                </th:block>
            </div>
        </div>
    </div>
</header>
</body>
</html>
