<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/main}">
<head>
    <title>Register</title>
</head>
<body>
<div layout:fragment="content">
    <div class="max-w-md mx-auto">
        <h1 class="text-3xl font-bold mb-8 text-center">Create Account</h1>

        <div th:if="${error}" class="mb-4 p-4 bg-red-100 border border-red-400 text-red-700 rounded-lg">
            <span th:text="${error}">Error message</span>
        </div>

        <form th:action="@{/auth/register}" th:object="${registerForm}" method="post" class="space-y-6">
            <div>
                <label for="email" class="block text-sm font-medium text-gray-700 mb-1">Email</label>
                <input type="email" id="email" th:field="*{email}"
                       class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500">
                <p th:if="${#fields.hasErrors('email')}" th:errors="*{email}" class="text-red-500 text-sm mt-1"></p>
            </div>

            <div>
                <label for="displayName" class="block text-sm font-medium text-gray-700 mb-1">Display Name (optional)</label>
                <input type="text" id="displayName" th:field="*{displayName}"
                       class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500">
            </div>

            <div>
                <label for="password" class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                <input type="password" id="password" th:field="*{password}"
                       class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500">
                <p th:if="${#fields.hasErrors('password')}" th:errors="*{password}" class="text-red-500 text-sm mt-1"></p>
            </div>

            <div>
                <label for="passwordConfirm" class="block text-sm font-medium text-gray-700 mb-1">Confirm Password</label>
                <input type="password" id="passwordConfirm" th:field="*{passwordConfirm}"
                       class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500">
                <p th:if="${#fields.hasErrors('passwordConfirm')}" th:errors="*{passwordConfirm}" class="text-red-500 text-sm mt-1"></p>
            </div>

            <button type="submit"
                    class="w-full px-6 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700">
                Create Account
            </button>
        </form>

        <p class="mt-6 text-center text-gray-600">
            Already have an account?
            <a th:href="@{/auth/login}" class="text-blue-600 hover:underline">Login</a>
        </p>
    </div>
</div>
</body>
</html>
