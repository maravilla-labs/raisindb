<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/main}">
<head>
    <title>Edit Article</title>
</head>
<body>
<div layout:fragment="content">
    <div class="max-w-4xl mx-auto">
        <h1 class="text-3xl font-bold mb-8">Edit Article</h1>

        <form th:action="@{/articles/{category}/{slug}/edit(category=${currentCategory},slug=${article.slug})}"
              method="post" class="space-y-6">
            <!-- Title -->
            <div>
                <label for="title" class="block text-sm font-medium text-gray-700 mb-1">Title</label>
                <input type="text" id="title" name="title" th:value="${article.properties.title}"
                       class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500">
            </div>

            <!-- Slug -->
            <div>
                <label for="slug" class="block text-sm font-medium text-gray-700 mb-1">URL Slug</label>
                <input type="text" id="slug" name="slug" th:value="${article.properties.slug}"
                       class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500">
            </div>

            <!-- Category -->
            <div>
                <label for="category" class="block text-sm font-medium text-gray-700 mb-1">Category</label>
                <select id="category" name="category"
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500">
                    <option th:each="cat : ${categories}"
                            th:value="${cat.slug}"
                            th:text="${cat.displayLabel}"
                            th:selected="${cat.slug == currentCategory}"></option>
                </select>
            </div>

            <!-- Excerpt -->
            <div>
                <label for="excerpt" class="block text-sm font-medium text-gray-700 mb-1">Excerpt</label>
                <textarea id="excerpt" name="excerpt" rows="2"
                          th:text="${article.properties.excerpt}"
                          class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500"></textarea>
            </div>

            <!-- Body -->
            <div>
                <label for="body" class="block text-sm font-medium text-gray-700 mb-1">Content (Markdown)</label>
                <textarea id="body" name="body" rows="15"
                          th:text="${article.properties.body}"
                          class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 font-mono"></textarea>
            </div>

            <!-- Image URL -->
            <div>
                <label for="imageUrl" class="block text-sm font-medium text-gray-700 mb-1">Image URL</label>
                <input type="url" id="imageUrl" name="imageUrl" th:value="${article.properties.imageUrl}"
                       class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500">
            </div>

            <!-- Status -->
            <div class="flex items-center space-x-6">
                <div class="flex items-center">
                    <input type="checkbox" id="featured" name="featured"
                           th:checked="${article.properties.featured}"
                           class="w-4 h-4 text-blue-600 border-gray-300 rounded focus:ring-blue-500">
                    <label for="featured" class="ml-2 text-sm text-gray-700">Featured</label>
                </div>
                <div>
                    <label for="status" class="text-sm text-gray-700 mr-2">Status:</label>
                    <select id="status" name="status"
                            class="px-3 py-1 border border-gray-300 rounded-lg">
                        <option value="draft" th:selected="${article.properties.status == 'draft'}">Draft</option>
                        <option value="published" th:selected="${article.properties.status == 'published'}">Published</option>
                    </select>
                </div>
            </div>

            <!-- Hidden fields -->
            <input type="hidden" name="author" th:value="${article.properties.author}">

            <!-- Incoming Connections (read-only) -->
            <div th:if="${not #lists.isEmpty(incomingConnections)}" class="p-4 bg-gray-50 rounded-lg">
                <h3 class="font-semibold mb-3">Incoming Connections</h3>
                <div th:each="conn : ${incomingConnections}" class="flex items-center justify-between py-2 border-b last:border-0">
                    <span th:text="${conn.sourceTitle}" class="text-gray-700"></span>
                    <span class="text-sm text-gray-500" th:text="${conn.relationType}"></span>
                </div>
            </div>

            <!-- Submit -->
            <div class="flex space-x-4">
                <button type="submit"
                        class="px-6 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700">
                    Save Changes
                </button>
                <a th:href="@{/articles/{category}/{slug}(category=${currentCategory},slug=${article.slug})}"
                   class="px-6 py-2 border border-gray-300 rounded-lg hover:bg-gray-50">
                    Cancel
                </a>
                <button type="button" onclick="deleteArticle()"
                        class="px-6 py-2 bg-red-600 text-white rounded-lg hover:bg-red-700 ml-auto">
                    Delete
                </button>
            </div>
        </form>
    </div>

    <script th:inline="javascript">
        function deleteArticle() {
            if (confirm('Are you sure you want to delete this article?')) {
                fetch([[${'/api/articles/' + currentCategory + '/' + article.slug}]], {
                    method: 'DELETE'
                }).then(response => {
                    if (response.ok) {
                        window.location.href = '/';
                    } else {
                        alert('Failed to delete article');
                    }
                });
            }
        }
    </script>
</div>
</body>
</html>
