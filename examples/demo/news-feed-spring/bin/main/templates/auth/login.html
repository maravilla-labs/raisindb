<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/main}">
<head>
    <title>Login</title>
</head>
<body>
<div layout:fragment="content">
    <div class="max-w-md mx-auto">
        <h1 class="text-3xl font-bold mb-8 text-center">Login</h1>

        <div th:if="${error}" class="mb-4 p-4 bg-red-100 border border-red-400 text-red-700 rounded-lg">
            <span th:text="${error}">Error message</span>
        </div>

        <form th:action="@{/auth/login}" th:object="${loginForm}" method="post" class="space-y-6">
            <input type="hidden" th:field="*{redirect}">

            <div>
                <label for="email" class="block text-sm font-medium text-gray-700 mb-1">Email</label>
                <input type="email" id="email" th:field="*{email}"
                       class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500">
                <p th:if="${#fields.hasErrors('email')}" th:errors="*{email}" class="text-red-500 text-sm mt-1"></p>
            </div>

            <div>
                <label for="password" class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                <input type="password" id="password" th:field="*{password}"
                       class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500">
                <p th:if="${#fields.hasErrors('password')}" th:errors="*{password}" class="text-red-500 text-sm mt-1"></p>
            </div>

            <div class="flex items-center">
                <input type="checkbox" id="rememberMe" th:field="*{rememberMe}"
                       class="w-4 h-4 text-blue-600 border-gray-300 rounded focus:ring-blue-500">
                <label for="rememberMe" class="ml-2 text-sm text-gray-700">Remember me</label>
            </div>

            <button type="submit"
                    class="w-full px-6 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700">
                Login
            </button>
        </form>

        <p class="mt-6 text-center text-gray-600">
            Don't have an account?
            <a th:href="@{/auth/register}" class="text-blue-600 hover:underline">Register</a>
        </p>
    </div>
</div>
</body>
</html>
