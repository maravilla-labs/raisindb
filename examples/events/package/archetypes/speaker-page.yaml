name: events:SpeakerPage
title: Speaker Page
base_node_type: events:Speaker

fields:
  - $type: TextField
    name: name
    title: Name
    required: true
  - $type: TextField
    name: slug
    title: URL Slug
    required: true
  - $type: TextField
    name: bio
    title: Bio
    translatable: true
  - $type: TextField
    name: title
    title: Job Title
  - $type: TextField
    name: company
    title: Company
  - $type: MediaField
    name: photo
    title: Photo
  - $type: TextField
    name: website
    title: Website
  - $type: TextField
    name: twitter
    title: Twitter
  - $type: TextField
    name: linkedin
    title: LinkedIn
  - $type: SectionField
    name: content
    title: Content
    allowed_element_types:
      - events:TextBlock
