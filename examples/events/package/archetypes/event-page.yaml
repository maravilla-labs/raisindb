name: events:EventPage
title: Event Page
base_node_type: events:Event

fields:
  - $type: TextField
    name: title
    title: Title
    required: true
    translatable: true
  - $type: TextField
    name: slug
    title: URL Slug
    required: true
  - $type: TextField
    name: description
    title: Description
    translatable: true
  - $type: DateField
    name: start_date
    title: Start Date
    required: true
  - $type: DateField
    name: end_date
    title: End Date
  - $type: TextField
    name: location
    title: Location
  - $type: TextField
    name: category
    title: Category
  - $type: NumberField
    name: capacity
    title: Capacity
  - $type: NumberField
    name: price
    title: Price
  - $type: TextField
    name: currency
    title: Currency
  - $type: BooleanField
    name: featured
    title: Featured
  - $type: MediaField
    name: cover_image
    title: Cover Image
  - $type: SectionField
    name: content
    title: Content
    allowed_element_types:
      - events:HeroBlock
      - events:TextBlock
      - events:SpeakerCard
      - events:ScheduleBlock

publishable: true
