# RaisinDB Node 2 Configuration
# Example 3-node cluster setup

[server]
port = 8082
bind_address = "127.0.0.1"
data_dir = "./data/node2"
initial_admin_password = "Admin1234567!8"  # Change in production!

[replication]
enabled = true
node_id = "node2"
port = 9002
bind_address = "127.0.0.1"

# Peer nodes in the cluster
[[replication.peers]]
peer_id = "node1"
address = "127.0.0.1"
port = 9001

[[replication.peers]]
peer_id = "node3"
address = "127.0.0.1"
port = 9003
