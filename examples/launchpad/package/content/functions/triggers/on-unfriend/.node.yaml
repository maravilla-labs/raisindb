node_type: raisin:Trigger
properties:
  title: Process Unfriend
  description: |
    Handles unfriend requests.
    Removes bidirectional FRIENDS_WITH graph edges between users.
  enabled: true
  trigger_type: node_event
  config:
    event_kinds:
      - Created
  filters:
    workspaces:
      - raisin:access_control
    paths:
      - "**/users/**/outbox/*"
    node_types:
      - raisin:Message
    property_filters:
      message_type: unfriend
      status: pending
  priority: 10
  max_retries: 3
  function_path: /lib/launchpad/handle-unfriend