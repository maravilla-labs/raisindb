name: launchpad:FileBrowser
title: File Browser
description: A file manager page for browsing, uploading, and previewing files
icon: folder-open
color: "#3b82f6"
base_node_type: launchpad:Page
version: 1

fields:
  - $type: TextField
    name: title
    title: Page Title
    required: true

  - $type: TextField
    name: slug
    title: URL Slug
    required: true

  - $type: TextField
    name: description
    title: Description
    required: false

publishable: true
