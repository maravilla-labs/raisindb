SPECIFICATION Spec

CONSTANTS
  Nodes = {node1, node2}
  NodeIds = {n1, n2}
  MaxTimestamp = 3
  MaxCounter = 1
  MaxOps = 8

INVARIANTS
  TypeOK
  DeliveredOpsValid
  VectorClockMonotonic
  NodeStateConsistent
  DeletedHasDeleteOp
  Convergence
  EventualConsistency

PROPERTIES
  DeleteWinsProperty
  NoResurrection
  RevisionMonotonicity

\* Check specific scenarios
CONSTRAINTS
  \* Limit state space for model checking
  Cardinality(operations) <= MaxOps

\* Symmetry reduction
SYMMETRY
  Permutations(Nodes)
  Permutations(NodeIds)
