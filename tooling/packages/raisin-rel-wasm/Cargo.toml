[package]
name = "raisin-rel-wasm"
version = "0.1.0"
edition = "2021"
description = "WASM bindings for Raisin Expression Language (REL)"
license = "BSL-1.1"

# Standalone workspace (excluded from parent)
[workspace]

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
raisin-rel = { path = "../../../crates/raisin-rel" }
wasm-bindgen = "0.2"
js-sys = "0.3"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
serde-wasm-bindgen = "0.6"
console_error_panic_hook = "0.1"

[dev-dependencies]
wasm-bindgen-test = "0.3"

[profile.release]
opt-level = "s"
lto = true
