[book]
title = "RaisinDB Documentation"
authors = ["RaisinDB Contributors"]
description = "A flexible, multi-tenant content database built with Rust"
language = "en"
src = "book/src"

[build]
build-dir = "book/output"

[output.html]
theme = "book/theme"
default-theme = "rust"
preferred-dark-theme = "navy"
git-repository-url = "https://github.com/maravilla-labs/raisindb"
edit-url-template = "https://github.com/maravilla-labs/raisindb/edit/main/{path}"

[output.html.playground]
editable = true
copyable = true

[output.html.search]
enable = true
limit-results = 30
teaser-word-count = 30
use-boolean-and = true
boost-title = 2
boost-hierarchy = 1
boost-paragraph = 1
expand = true
heading-split-level = 3
