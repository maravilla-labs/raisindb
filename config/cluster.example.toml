# RaisinDB Cluster Replication Configuration
# This file configures TCP-based database-to-database replication

[cluster]
# Unique identifier for this cluster node
# Each node in the cluster must have a unique node_id
node_id = "node1"

# Port for incoming replication connections (TCP)
# Default: 9001
replication_port = 9001

# Network interface to bind the replication server
# Use "0.0.0.0" to listen on all interfaces
# Use "127.0.0.1" for localhost-only (testing)
bind_address = "0.0.0.0"

# Peer nodes to replicate with
# Each peer represents another RaisinDB instance in the cluster
[[peers]]
node_id = "node2"
host = "10.0.1.2"
port = 9001
enabled = true
priority = 1
# Optional: Only replicate specific branches
# branch_filter = ["main", "production"]

[[peers]]
node_id = "node3"
host = "10.0.1.3"
port = 9001
enabled = true
priority = 1

# Synchronization configuration
[sync]
# Interval between periodic pull-based sync (seconds)
# Set to 0 to disable periodic sync (real-time push only)
# Default: 30
interval_seconds = 30

# Maximum number of operations to fetch in a single batch
# Larger batches are more efficient but use more memory
# Default: 1000
batch_size = 1000

# Enable real-time push of operations to peers after transaction commit
# When enabled, operations are pushed immediately after writes
# When disabled, only periodic pull sync is used
# Default: true
realtime_push = true

# Connection settings
[connection]
# Timeout for establishing TCP connection to peer (seconds)
# Default: 10
connect_timeout_seconds = 10

# Timeout for reading messages from peer (seconds)
# Default: 30
read_timeout_seconds = 30

# Timeout for writing messages to peer (seconds)
# Default: 30
write_timeout_seconds = 30

# Interval for sending heartbeat pings to peers (seconds)
# Default: 30
heartbeat_interval_seconds = 30

# Retry configuration for failed connections
[sync.retry]
# Maximum number of retry attempts before giving up
# Default: 5
max_attempts = 5

# Initial delay between retries (milliseconds)
# Delay increases exponentially with each retry
# Default: 1000 (1 second)
base_delay_ms = 1000

# Maximum delay between retries (milliseconds)
# Caps the exponential backoff
# Default: 60000 (1 minute)
max_backoff_ms = 60000

# Jitter factor to randomize retry delays (0.0 - 1.0)
# Helps prevent thundering herd when multiple nodes retry simultaneously
# Default: 0.1 (10% jitter)
jitter_factor = 0.1
