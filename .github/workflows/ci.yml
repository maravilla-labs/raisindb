name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - 'book/**'
      - 'book.toml'
  pull_request:
    branches: [main]
    paths-ignore:
      - 'book/**'
      - 'book.toml'

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.89.0
          components: rustfmt
      - run: cargo fmt --all -- --check
