name: Publish npm packages

on:
  push:
    tags:
      - "npm-v*"
  workflow_dispatch:
    inputs:
      package:
        description: "Package to publish"
        required: true
        default: all
        type: choice
        options:
          - all
          - schema-wasm
          - functions-types
          - client
          - cli
      version:
        description: "Version override (leave empty for auto-bump patch)"
        required: false

jobs:
  publish-schema-wasm:
    name: Publish @raisindb/schema-wasm
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'push' ||
      inputs.package == 'all' ||
      inputs.package == 'schema-wasm'
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install wasm-pack
        run: cargo install wasm-pack

      - name: Build WASM
        run: cd tooling/packages/raisin-schema-wasm && bash build.sh

      - name: Set version
        working-directory: tooling/packages/raisin-schema-wasm/pkg
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            VER="${GITHUB_REF_NAME#npm-v}"
          elif [[ -n "${{ inputs.version }}" ]]; then
            VER="${{ inputs.version }}"
          else
            VER=""
          fi
          if [[ -n "$VER" ]]; then
            npm version --no-git-tag-version "$VER" --allow-same-version
          fi
          echo "VERSION=$VER" >> $GITHUB_ENV

      - name: Publish
        working-directory: tooling/packages/raisin-schema-wasm/pkg
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public

      - name: Summary
        run: echo "Published @raisindb/schema-wasm v$VERSION" >> $GITHUB_STEP_SUMMARY

  publish-functions-types:
    name: Publish @raisindb/functions-types
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'push' ||
      inputs.package == 'all' ||
      inputs.package == 'functions-types'
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            pkg-config libssl-dev libleptonica-dev libtesseract-dev

      - name: Generate types from Rust bindings
        run: cargo test --package raisin-functions test_generate_and_write_dts -- --nocapture

      - name: Set version
        working-directory: packages/raisindb-functions-types
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            VER="${GITHUB_REF_NAME#npm-v}"
          elif [[ -n "${{ inputs.version }}" ]]; then
            VER="${{ inputs.version }}"
          else
            VER=""
          fi
          if [[ -n "$VER" ]]; then
            npm version --no-git-tag-version "$VER" --allow-same-version
          else
            npm version --no-git-tag-version patch
          fi
          echo "VERSION=$VER" >> $GITHUB_ENV

      - name: Publish
        working-directory: packages/raisindb-functions-types
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public

      - name: Summary
        run: echo "Published @raisindb/functions-types v$VERSION" >> $GITHUB_STEP_SUMMARY

  publish-client:
    name: Publish @raisindb/client
    runs-on: ubuntu-latest
    needs: publish-schema-wasm
    if: >
      always() &&
      (needs.publish-schema-wasm.result == 'success' || needs.publish-schema-wasm.result == 'skipped') &&
      (github.event_name == 'push' || inputs.package == 'all' || inputs.package == 'client')
    defaults:
      run:
        working-directory: packages/raisin-client-js
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install deps
        run: npm install --no-audit --no-fund --ignore-scripts

      - name: Set version
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            VER="${GITHUB_REF_NAME#npm-v}"
          elif [[ -n "${{ inputs.version }}" ]]; then
            VER="${{ inputs.version }}"
          else
            VER=""
          fi
          if [[ -n "$VER" ]]; then
            npm version --no-git-tag-version "$VER"
          else
            npm version --no-git-tag-version patch
          fi
          echo "VERSION=$VER" >> $GITHUB_ENV

      - name: Build
        run: npm run build --if-present

      - name: Publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public

      - name: Summary
        run: echo "Published @raisindb/client v$VERSION" >> $GITHUB_STEP_SUMMARY

  publish-cli:
    name: Publish @raisindb/cli
    runs-on: ubuntu-latest
    needs: [publish-schema-wasm, publish-client]
    if: >
      always() &&
      (needs.publish-client.result == 'success' || needs.publish-client.result == 'skipped') &&
      (needs.publish-schema-wasm.result == 'success' || needs.publish-schema-wasm.result == 'skipped') &&
      (github.event_name == 'push' || inputs.package == 'all' || inputs.package == 'cli')
    env:
      NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install workspace deps
        run: pnpm install

      - name: Set version
        working-directory: packages/raisindb-cli
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            VER="${GITHUB_REF_NAME#npm-v}"
          elif [[ -n "${{ inputs.version }}" ]]; then
            VER="${{ inputs.version }}"
          else
            VER=""
          fi
          if [[ -n "$VER" ]]; then
            npm version --no-git-tag-version "$VER"
          else
            npm version --no-git-tag-version patch
          fi
          echo "VERSION=$VER" >> $GITHUB_ENV

      - name: Build
        run: pnpm --filter @raisindb/cli run build

      - name: Align workspace dependency versions
        run: |
          VER="${{ env.VERSION }}"
          if [[ -z "$VER" ]]; then
            echo "VERSION not set, skipping alignment"
            exit 0
          fi
          # Update local schema-wasm pkg version so workspace:* resolves correctly
          cd tooling/packages/raisin-schema-wasm/pkg
          node -e "const fs=require('fs'); const p=JSON.parse(fs.readFileSync('package.json','utf8')); p.version='$VER'; fs.writeFileSync('package.json', JSON.stringify(p,null,2)+'\n')"
          cd -
          # Same for client
          cd packages/raisin-client-js
          npm version --no-git-tag-version "$VER" --allow-same-version
          cd -
          # Reinstall to update pnpm lockfile with new versions
          pnpm install --no-frozen-lockfile

      - name: Publish
        run: pnpm --filter @raisindb/cli publish --access public --no-git-checks

      - name: Summary
        run: echo "Published @raisindb/cli v$VERSION" >> $GITHUB_STEP_SUMMARY
