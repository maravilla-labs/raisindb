name: Publish npm packages

on:
  push:
    tags:
      - "npm-v*"
  workflow_dispatch:
    inputs:
      package:
        description: "Package to publish (all, client, cli)"
        required: true
        default: all
        type: choice
        options:
          - all
          - client
          - cli
      version:
        description: "Version override (leave empty for auto-bump patch)"
        required: false

jobs:
  publish-client:
    name: Publish @raisindb/client
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'push' ||
      inputs.package == 'all' ||
      inputs.package == 'client'
    defaults:
      run:
        working-directory: packages/raisin-client-js
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          scope: '@raisindb'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install deps
        run: pnpm install --frozen-lockfile
        working-directory: .

      - name: Set version
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            VER="${GITHUB_REF_NAME#npm-v}"
          elif [[ -n "${{ inputs.version }}" ]]; then
            VER="${{ inputs.version }}"
          else
            VER=""
          fi
          if [[ -n "$VER" ]]; then
            npm version --no-git-tag-version "$VER"
          else
            npm version --no-git-tag-version patch
          fi
          echo "VERSION=$(node -p 'require(\"./package.json\").version')" >> $GITHUB_ENV

      - name: Build
        run: pnpm build
        working-directory: .

      - name: Publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public

      - name: Summary
        run: echo "Published @raisindb/client v$VERSION" >> $GITHUB_STEP_SUMMARY

  publish-cli:
    name: Publish @raisindb/cli
    runs-on: ubuntu-latest
    needs: publish-client
    if: >
      always() &&
      (needs.publish-client.result == 'success' || needs.publish-client.result == 'skipped') &&
      (github.event_name == 'push' || inputs.package == 'all' || inputs.package == 'cli')
    defaults:
      run:
        working-directory: packages/raisindb-cli
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          scope: '@raisindb'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install deps
        run: pnpm install --frozen-lockfile
        working-directory: .

      - name: Set version
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            VER="${GITHUB_REF_NAME#npm-v}"
          elif [[ -n "${{ inputs.version }}" ]]; then
            VER="${{ inputs.version }}"
          else
            VER=""
          fi
          if [[ -n "$VER" ]]; then
            npm version --no-git-tag-version "$VER"
          else
            npm version --no-git-tag-version patch
          fi
          echo "VERSION=$(node -p 'require(\"./package.json\").version')" >> $GITHUB_ENV

      - name: Build
        run: pnpm build
        working-directory: .

      - name: Publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public

      - name: Summary
        run: echo "Published @raisindb/cli v$VERSION" >> $GITHUB_STEP_SUMMARY
