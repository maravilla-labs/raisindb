name: Publish npm packages

on:
  push:
    tags:
      - "npm-v*"
  workflow_dispatch:
    inputs:
      package:
        description: "Package to publish"
        required: true
        default: all
        type: choice
        options:
          - all
          - schema-wasm
          - client
          - cli
      version:
        description: "Version override (leave empty for auto-bump patch)"
        required: false

jobs:
  publish-schema-wasm:
    name: Publish @raisindb/schema-wasm
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'push' ||
      inputs.package == 'all' ||
      inputs.package == 'schema-wasm'
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install wasm-pack
        run: cargo install wasm-pack

      - name: Build WASM
        run: cd tooling/packages/raisin-schema-wasm && bash build.sh

      - name: Set version
        working-directory: tooling/packages/raisin-schema-wasm/pkg
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            VER="${GITHUB_REF_NAME#npm-v}"
          elif [[ -n "${{ inputs.version }}" ]]; then
            VER="${{ inputs.version }}"
          else
            VER=""
          fi
          if [[ -n "$VER" ]]; then
            npm version --no-git-tag-version "$VER" --allow-same-version
          fi
          echo "VERSION=$(node -p 'require(\"./package.json\").version')" >> $GITHUB_ENV

      - name: Publish
        working-directory: tooling/packages/raisin-schema-wasm/pkg
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public

      - name: Summary
        run: echo "Published @raisindb/schema-wasm v$VERSION" >> $GITHUB_STEP_SUMMARY

  publish-client:
    name: Publish @raisindb/client
    runs-on: ubuntu-latest
    needs: publish-schema-wasm
    if: >
      always() &&
      (needs.publish-schema-wasm.result == 'success' || needs.publish-schema-wasm.result == 'skipped') &&
      (github.event_name == 'push' || inputs.package == 'all' || inputs.package == 'client')
    defaults:
      run:
        working-directory: packages/raisin-client-js
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install deps
        run: npm install --no-audit --no-fund --ignore-scripts

      - name: Set version
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            VER="${GITHUB_REF_NAME#npm-v}"
          elif [[ -n "${{ inputs.version }}" ]]; then
            VER="${{ inputs.version }}"
          else
            VER=""
          fi
          if [[ -n "$VER" ]]; then
            npm version --no-git-tag-version "$VER"
          else
            npm version --no-git-tag-version patch
          fi
          echo "VERSION=$(node -p 'require(\"./package.json\").version')" >> $GITHUB_ENV

      - name: Build
        run: npm run build --if-present

      - name: Publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public

      - name: Summary
        run: echo "Published @raisindb/client v$VERSION" >> $GITHUB_STEP_SUMMARY

  publish-cli:
    name: Publish @raisindb/cli
    runs-on: ubuntu-latest
    needs: [publish-schema-wasm, publish-client]
    if: >
      always() &&
      (needs.publish-client.result == 'success' || needs.publish-client.result == 'skipped') &&
      (needs.publish-schema-wasm.result == 'success' || needs.publish-schema-wasm.result == 'skipped') &&
      (github.event_name == 'push' || inputs.package == 'all' || inputs.package == 'cli')
    defaults:
      run:
        working-directory: packages/raisindb-cli
    env:
      NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Resolve workspace deps
        run: |
          CLIENT_VER=$(npm view @raisindb/client version 2>/dev/null || echo "0.1.0")
          sed -i "s|\"workspace:\*\"|\"^$CLIENT_VER\"|g" package.json
          echo "Resolved @raisindb/client to ^$CLIENT_VER"

      - name: Install deps
        run: npm install --no-audit --no-fund --ignore-scripts

      - name: Set version
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            VER="${GITHUB_REF_NAME#npm-v}"
          elif [[ -n "${{ inputs.version }}" ]]; then
            VER="${{ inputs.version }}"
          else
            VER=""
          fi
          if [[ -n "$VER" ]]; then
            npm version --no-git-tag-version "$VER"
          else
            npm version --no-git-tag-version patch
          fi
          echo "VERSION=$(node -p 'require(\"./package.json\").version')" >> $GITHUB_ENV

      - name: Build
        run: npx tsc

      - name: Publish
        run: npm publish --access public

      - name: Summary
        run: echo "Published @raisindb/cli v$VERSION" >> $GITHUB_STEP_SUMMARY
