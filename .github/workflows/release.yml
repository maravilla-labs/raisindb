name: Server cross-platform release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g., v0.1.0)"
        required: false
      prerelease:
        description: "Mark the release as a prerelease"
        required: false
        default: false
        type: boolean
      draft:
        description: "Create the release as a draft (not public)"
        required: false
        default: false
        type: boolean
      bump:
        description: "Auto-bump when tag omitted (patch|minor|major)"
        required: false
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

env:
  BIN_NAME: raisin-server
  CARGO_TERM_COLOR: always

jobs:
  prepare:
    name: Prepare tag
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.compute.outputs.tag }}
    steps:
      - name: Compute release tag
        id: compute
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "push" ]]; then
            TAG="${GITHUB_REF_NAME}"
          else
            if [[ -n "${{ inputs.tag }}" ]]; then
              TAG="${{ inputs.tag }}"
            else
              echo "Deriving next tag from existing releases..."
              LATEST=$(gh release view --repo "${{ github.repository }}" --json tagName -q .tagName 2>/dev/null || true)
              if [[ -z "$LATEST" ]]; then BASE="0.1.0"; else BASE="${LATEST#v}"; fi
              PART="${{ inputs.bump }}"
              IFS='.' read -r MAJOR MINOR PATCH <<< "$BASE"
              case "$PART" in
                major) MAJOR=$((MAJOR+1)); MINOR=0; PATCH=0;;
                minor) MINOR=$((MINOR+1)); PATCH=0;;
                *) PATCH=$((PATCH+1));;
              esac
              TAG="v${MAJOR}.${MINOR}.${PATCH}"
            fi
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  frontend:
    name: Build frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.89.0

      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install wasm-pack
        run: cargo install wasm-pack

      - name: Build WASM packages
        run: |
          cd tooling/packages/raisin-sql-wasm && bash build.sh && cd ../../..
          cd tooling/packages/raisin-rel-wasm && bash build.sh && cd ../../..
          cd tooling/packages/raisin-schema-wasm && bash build.sh && cd ../../..

      - run: pnpm install

      - name: Build admin console
        run: |
          cd packages/raisin-flow-designer && pnpm run build && cd ../..
          cd packages/admin-console && pnpm run build && cd ../..

      - name: Verify admin console dist
        run: ls -la crates/raisin-server/.admin-console-dist/

      - name: Upload admin console dist
        uses: actions/upload-artifact@v4
        with:
          name: admin-console-dist
          path: crates/raisin-server/.admin-console-dist/*
          retention-days: 1
          include-hidden-files: true

  build:
    name: Build ${{ matrix.target }}
    needs: [prepare, frontend]
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: tar.gz
            ext: ""
            features: "storage-rocksdb,websocket,pgwire,fs,pdf,pdf-markdown,candle,ocr"
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: zip
            ext: ".exe"
            features: "storage-rocksdb,websocket,pgwire,fs,pdf,pdf-markdown,candle,ocr"
          - os: macos-14
            target: aarch64-apple-darwin
            archive: tar.gz
            ext: ""
            features: "storage-rocksdb,websocket,pgwire,fs,pdf,pdf-markdown,candle,ocr"
    runs-on: ${{ matrix.os }}
    env:
      RELEASE_TAG: ${{ needs.prepare.outputs.release_tag }}
      SKIP_ADMIN_BUILD: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.89.0
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Download admin console dist
        uses: actions/download-artifact@v4
        with:
          name: admin-console-dist
          path: crates/raisin-server/.admin-console-dist/

      # --- Platform-specific system deps ---

      - name: Install system deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            pkg-config libssl-dev libleptonica-dev libtesseract-dev

      - name: Install system deps (macOS)
        if: runner.os == 'macOS'
        run: brew install tesseract leptonica pkg-config

      - name: Install NASM (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/setup-nasm@v1

      - name: Install system deps (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          vcpkg install leptonica:x64-windows-static tesseract:x64-windows-static
          echo "VCPKG_ROOT=$env:VCPKG_INSTALLATION_ROOT" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          echo "CMAKE_TOOLCHAIN_FILE=$env:VCPKG_INSTALLATION_ROOT\scripts\buildsystems\vcpkg.cmake" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          # Fix usearch POSIX mmap symbols missing on Windows
          echo 'CXXFLAGS=-DMAP_FAILED=((void*)-1)' | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          # Force static CRT to match esaxx_rs (which hardcodes static_crt(true))
          echo 'RUSTFLAGS=-C target-feature=+crt-static' | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          # Force aws-lc-sys to use CMake builder (avoids __builtin_bswap errors with static CRT)
          echo 'AWS_LC_SYS_CMAKE_BUILDER=1' | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      # --- Build ---

      - name: Set version from tag
        shell: bash
        run: |
          TAG_NAME="$RELEASE_TAG"
          VER="${TAG_NAME#v}"
          if [[ -n "$VER" && "$VER" != "$TAG_NAME" ]]; then
            echo "Setting raisin-server version to $VER"
            awk -v ver="$VER" '/^version *= *"[0-9]/ && !done { sub(/"[0-9]+\.[0-9]+\.[0-9]+"/, "\"" ver "\""); done=1 } 1' \
              crates/raisin-server/Cargo.toml > crates/raisin-server/Cargo.toml.tmp \
              && mv crates/raisin-server/Cargo.toml.tmp crates/raisin-server/Cargo.toml
            grep "^version" crates/raisin-server/Cargo.toml
          fi

      - name: Build
        shell: bash
        run: |
          cargo build --release --package raisin-server \
            --no-default-features \
            --features "${{ matrix.features }}" \
            --target ${{ matrix.target }}

      # --- Package ---

      - name: Package (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          TAG_NAME="$RELEASE_TAG"
          ARTIFACT_NAME="raisindb-${TAG_NAME}-${{ matrix.target }}"
          echo "ARTIFACT_NAME=$ARTIFACT_NAME" >> $GITHUB_ENV
          mkdir -p dist/$ARTIFACT_NAME
          cp target/${{ matrix.target }}/release/${BIN_NAME}${{ matrix.ext }} dist/$ARTIFACT_NAME/raisindb${{ matrix.ext }}
          if [ -f LICENSE ]; then cp LICENSE dist/$ARTIFACT_NAME/; fi
          tar -C dist -czf "dist/$ARTIFACT_NAME.${{ matrix.archive }}" "$ARTIFACT_NAME"

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $tagName = $env:RELEASE_TAG
          $artifactName = "raisindb-$tagName-${{ matrix.target }}"
          echo "ARTIFACT_NAME=$artifactName" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          New-Item -ItemType Directory -Force -Path "dist/$artifactName" | Out-Null
          Copy-Item "target\${{ matrix.target }}\release\$env:BIN_NAME${{ matrix.ext }}" "dist\$artifactName\raisindb${{ matrix.ext }}"
          if (Test-Path "LICENSE") { Copy-Item "LICENSE" "dist\$artifactName\" }
          Compress-Archive -Path "dist/$artifactName/*" -DestinationPath "dist/$artifactName.${{ matrix.archive }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: |
            dist/*.${{ matrix.archive }}
          if-no-files-found: error

  publish:
    name: Create GitHub Release
    needs: [prepare, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      RELEASE_TAG: ${{ needs.prepare.outputs.release_tag }}
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: raw-artifacts
          merge-multiple: true

      - name: Collect release files
        run: |
          mkdir -p artifacts
          cp raw-artifacts/*.tar.gz raw-artifacts/*.zip artifacts/ 2>/dev/null || true
          ls -lah artifacts

      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum * > SHA256SUMS || shasum -a 256 * > SHA256SUMS
          cat SHA256SUMS

      - name: Create or update release
        env:
          INPUT_PRERELEASE: "${{ inputs.prerelease }}"
          INPUT_DRAFT: "${{ inputs.draft }}"
        run: |
          set -euo pipefail
          TAG="$RELEASE_TAG"
          echo "Publishing release $TAG"

          ASSETS=(artifacts/*)

          if gh release view "$TAG" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            echo "Release exists. Uploading assets with clobber..."
            gh release upload "$TAG" "${ASSETS[@]}" --repo "${{ github.repository }}" --clobber
          else
            echo "Creating release and uploading assets..."
            CREATE_FLAGS=()
            if [ "${INPUT_PRERELEASE}" = "true" ]; then CREATE_FLAGS+=(--prerelease); fi
            if [ "${INPUT_DRAFT}" = "true" ]; then CREATE_FLAGS+=(--draft); fi
            gh release create "$TAG" "${ASSETS[@]}" \
              --repo "${{ github.repository }}" \
              --title "RaisinDB $TAG" \
              --generate-notes \
              "${CREATE_FLAGS[@]}"
          fi

      - name: Summary
        run: echo "Published RaisinDB $RELEASE_TAG" >> $GITHUB_STEP_SUMMARY
